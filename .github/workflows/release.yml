name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - run: npm install -g @vscode/vsce

      - run: vsce package

      - uses: softprops/action-gh-release@v3
        with:
          files: '*.vsix'
