name: Release

permissions:
  contents: write
  id-token: write

on:
  release:
    types:
      - published

env:
  NODE_VERSION: '22'

jobs:
  verify-release:
    name: Verify Release Metadata
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}

    outputs:
      extension_version: ${{ steps.version.outputs.extension_version }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read extension version
        id: version
        working-directory: apps/vscode-extension
        run: |
          extension_version=$(node -p "require('./package.json').version")
          echo "extension_version=$extension_version" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches extension version
        run: |
          expected_tag="v${{ steps.version.outputs.extension_version }}"
          actual_tag="${{ github.event.release.tag_name }}"

          if [ "$expected_tag" != "$actual_tag" ]; then
            echo "Release tag $actual_tag does not match apps/vscode-extension/package.json version $expected_tag."
            exit 1
          fi

  build-vsix:
    name: Build ${{ matrix.target }} VSIX
    needs: verify-release
    if: ${{ !github.event.release.prerelease }}
    runs-on: ${{ matrix.runs_on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runs_on: macos-latest
          - target: darwin-x64
            runs_on: macos-15-intel
          - target: linux-x64
            runs_on: ubuntu-latest
          - target: win32-x64
            runs_on: windows-latest

    defaults:
      run:
        working-directory: apps/vscode-extension

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vscode-extension/package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Run extension validation
        run: npm run compile

      - name: Build bundled CLI
        working-directory: ${{ github.workspace }}
        run: cargo build --release -p frilvault-cli

      - name: Build platform VSIX
        run: npm run vsix -- --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: apps/vscode-extension/frilvault-${{ needs.verify-release.outputs.extension_version }}-${{ matrix.target }}.vsix
          if-no-files-found: error

  attach-release-assets:
    name: Attach Release Assets
    needs:
      - verify-release
      - build-vsix
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest

    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: vsix-*
          path: dist/release
          merge-multiple: true

      - name: Upload VSIX files to the GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/release/*.vsix

  publish-marketplace:
    name: Publish Visual Studio Marketplace
    needs:
      - verify-release
      - build-vsix
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: marketplace-production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: vsix-*
          path: dist/release
          merge-multiple: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install vsce
        working-directory: apps/vscode-extension
        run: npm ci

      - name: Authenticate to Azure with GitHub OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish platform-specific VSIX packages with Entra credentials
        working-directory: apps/vscode-extension
        run: |
          npx @vscode/vsce publish --packagePath ../../dist/release/frilvault-${{ needs.verify-release.outputs.extension_version }}-darwin-arm64.vsix --azure-credential
          npx @vscode/vsce publish --packagePath ../../dist/release/frilvault-${{ needs.verify-release.outputs.extension_version }}-darwin-x64.vsix --azure-credential
          npx @vscode/vsce publish --packagePath ../../dist/release/frilvault-${{ needs.verify-release.outputs.extension_version }}-linux-x64.vsix --azure-credential
          npx @vscode/vsce publish --packagePath ../../dist/release/frilvault-${{ needs.verify-release.outputs.extension_version }}-win32-x64.vsix --azure-credential
