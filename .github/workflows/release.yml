name: Release

permissions:
  contents: write

on:
  release:
    types:
      - published

env:
  NODE_VERSION: '22'

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify-release:
    name: Verify Release Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      extension_version: ${{ steps.version.outputs.extension_version }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Read extension version
        id: version
        working-directory: apps/vscode-extension
        shell: bash
        run: |
          extension_version=$(node -p "require('./package.json').version")
          echo "extension_version=$extension_version" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        shell: bash
        run: |
          expected_tag="frilvault-v${{ steps.version.outputs.extension_version }}"
          actual_tag="${{ github.event.release.tag_name }}"

          if [ "$expected_tag" != "$actual_tag" ]; then
            echo "::error::Expected '$expected_tag', received '$actual_tag'."
            exit 1
          fi

  build-vsix:
    name: Build ${{ matrix.target }}
    needs: verify-release
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runs_on: macos-latest
            binary_name: flvt

          - target: darwin-x64
            runs_on: macos-15-intel
            binary_name: flvt

          - target: linux-x64
            runs_on: ubuntu-latest
            binary_name: flvt

          - target: win32-x64
            runs_on: windows-latest
            binary_name: flvt.exe

    defaults:
      run:
        working-directory: apps/vscode-extension

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Clean untrusted Homebrew taps
        if: runner.os == 'macOS'
        shell: bash
        run: brew untap aws/tap || true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/vscode-extension/package-lock.json

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install extension dependencies
        run: npm ci

      - name: Validate extension
        run: |
          npm run check-types
          npm run lint
          npm run compile

      - name: Build bundled CLI
        working-directory: ${{ github.workspace }}
        run: cargo build --release --locked -p frilvault-cli

      - name: Bundle CLI on Unix
        if: runner.os != 'Windows'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          destination="apps/vscode-extension/bin/${{ matrix.target }}"

          rm -rf apps/vscode-extension/bin
          mkdir -p "$destination"

          cp target/release/flvt "$destination/flvt"
          chmod +x "$destination/flvt"

          test -x "$destination/flvt"

      - name: Bundle CLI on Windows
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $destination = "apps/vscode-extension/bin/${{ matrix.target }}"

          if (Test-Path "apps/vscode-extension/bin") {
            Remove-Item "apps/vscode-extension/bin" -Recurse -Force
          }

          New-Item -ItemType Directory -Path $destination -Force | Out-Null
          Copy-Item "target/release/flvt.exe" "$destination/flvt.exe"

          if (-not (Test-Path "$destination/flvt.exe")) {
            throw "Bundled CLI was not created."
          }

      - name: Build platform VSIX
        shell: bash
        run: |
          npx @vscode/vsce package \
            --target "${{ matrix.target }}" \
            --out "frilvault-${{ needs.verify-release.outputs.extension_version }}-${{ matrix.target }}.vsix"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: vsix-${{ matrix.target }}
          path: apps/vscode-extension/frilvault-${{ needs.verify-release.outputs.extension_version }}-${{ matrix.target }}.vsix
          if-no-files-found: error
          retention-days: 7

  attach-release-assets:
    name: Attach Release Assets
    needs:
      - verify-release
      - build-vsix
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: vsix-*
          path: dist/release
          merge-multiple: true

      - name: Show release files
        run: ls -lah dist/release

      - name: Attach VSIX files
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/release/*.vsix
          fail_on_unmatched_files: true
