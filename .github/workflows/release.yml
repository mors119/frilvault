name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm install -g @vscode/vsce

      - run: vsce package

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
